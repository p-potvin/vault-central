<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Favorites Central Dashboard</title>
  <style>
    /* Default Dark Theme */
    :root {
      --bg-color: #0d1117;
      --sidebar-bg: #161b22;
      --card-bg: #1c2128;
      --text-color: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #2f81f7;
      --accent-hover: #1f6feb;
      --danger: #f85149;
      --border-color: #30363d;
      --icon-filter: none;
    }
    
    /* Light Theme */
    :root[data-theme="light"] {
      --bg-color: #f6f8fa;
      --sidebar-bg: #ffffff;
      --card-bg: #ffffff;
      --text-color: #24292f;
      --text-muted: #57606a;
      --accent: #0969da;
      --accent-hover: #0349b4;
      --danger: #cf222e;
      --border-color: #d0d7de;
      --icon-filter: brightness(0) saturate(100%);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI Semilight", "Segoe UI", -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
      font-weight: 300;
      background: var(--bg-color);
      color: var(--text-color);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    aside {
      width: 280px;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      padding: 24px;
      box-sizing: border-box;
      flex-shrink: 0;
      transition: width 0.3s, padding 0.3s;
      overflow: hidden;
      white-space: nowrap;
    }
    aside.collapsed {
      width: 0;
      padding-left: 0;
      padding-right: 0;
    }
    .sidebar-toggle {
      width: 15px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-color);
      border-left: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
      z-index: 100;
    }
    .sidebar-toggle:hover {
      background: var(--border-color);
    }
    .sidebar-toggle svg {
      width: 12px;
      height: 12px;
      fill: var(--text-muted);
      transition: transform 0.3s;
    }
    aside.collapsed + .sidebar-toggle svg {
      transform: scaleX(-1);
    }
    .brand {
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand svg {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: var(--accent);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .brand h1 {
      font-size: 1.6rem;
      margin: 0;
      font-weight: 300;
      letter-spacing: 0.5px;
      color: var(--text-color);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand span { color: var(--accent); }
    .control-group {
      margin-bottom: 24px;
    }
    .control-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 400;
      margin-bottom: 8px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    input[type="text"], select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 6px;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      font-size: 0.95rem;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, select:focus {
      border-color: var(--accent);
    }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    input[type="range"] {
      flex: 1;
    }
    main {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
    }
    header {
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
      max-width: 400px;
    }
    .header-actions input[type="text"] {
      flex: 1;
      margin-bottom: 0;
    }
    .theme-toggle {
      background: none;
      border: 1px solid var(--border-color);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-color);
      transition: background 0.2s, color 0.2s;
    }
    .theme-toggle:hover {
      background: var(--border-color);
    }
    .theme-toggle svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    header h2 {
      margin: 0;
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: 0.5px;
      color: var(--text-color);
    }
    .empty-state {
      text-align: center;
      padding: 64px 20px;
      border: 2px dashed var(--border-color);
      border-radius: 12px;
      color: var(--text-muted);
      font-size: 1.1rem;
    }
    .group-header {
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: 0.5px;
      margin: 40px 0 16px;
      color: var(--text-color);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: color 0.2s;
    }
    .group-header:hover {
      color: var(--accent);
    }
    .group-header svg {
      width: 20px;
      height: 20px;
      transition: transform 0.2s;
      fill: currentColor;
    }
    .group-header.collapsed svg {
      transform: rotate(-90deg);
    }
    .group-container {
      display: grid;
      gap: 24px;
      margin-bottom: 40px;
    }
    /* Dynamic Layout Classes */
    .layout-1 {
      display: flex !important;
      flex-direction: column !important;
      gap: 16px;
    }
    .layout-2 { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
    .layout-3 { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    .layout-4 { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
    .layout-5 { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }

    /* Compact Styles for smaller layouts */
    .layout-2 .card-content { padding: 8px; }
    .layout-2 .title { font-size: 0.8rem; line-height: 1.2; -webkit-line-clamp: 2; line-clamp: 2; margin-bottom: 2px; }
    .layout-2 .meta-info { flex-direction: column; align-items: flex-start; gap: 4px; font-size: 0.7rem; }
    .layout-2 .extra-meta { display: none; }
    .layout-2 .delete { width: 22px; height: 22px; top: 4px; right: 4px; }
    .layout-2 .delete svg { width: 10px; height: 10px; }
    .layout-2 .duration-badge { font-size: 0.65rem; padding: 1px 3px; bottom: 4px; right: 4px; }
    .layout-2 .badge { font-size: 0.6rem; padding: 1px 4px; }
    
    .layout-3 .card-content { padding: 10px; }
    .layout-3 .title { font-size: 0.9rem; line-height: 1.3; }
    .layout-3 .meta-info { flex-direction: column; align-items: flex-start; gap: 4px; font-size: 0.75rem; }
    .layout-3 .extra-meta { font-size: 0.7rem; }
    .layout-3 .delete { width: 24px; height: 24px; top: 6px; right: 6px; }
    .layout-3 .delete svg { width: 12px; height: 12px; }
    .layout-3 .duration-badge { font-size: 0.7rem; padding: 2px 4px; bottom: 6px; right: 6px; }

    .layout-4 .card-content { padding: 12px; }
    .layout-4 .title { font-size: 0.95rem; line-height: 1.35; }
    .layout-4 .meta-info { font-size: 0.75rem; gap: 6px; }
    
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .layout-1 .card {
      flex-direction: row;
      height: 100px;
      align-items: center;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.2);
      border-color: #8b949e;
    }
    .thumb-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
      overflow: hidden;
      border-bottom: 1px solid var(--border-color);
    }
    .layout-1 .thumb-wrapper {
      width: 177px;
      padding-top: 0;
      height: 100%;
      flex-shrink: 0;
      border-bottom: none;
      border-right: 1px solid var(--border-color);
    }
    .thumb-wrapper img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }
    .card:hover .thumb-wrapper img {
      transform: scale(1.05);
    }
    .card-content {
      padding: 16px;
      display: flex;
      flex-direction: column;
      flex: 1;
      box-sizing: border-box;
    }
    .layout-1 .card-content {
      padding: 12px 16px;
      flex-direction: row;
      align-items: center;
      gap: 20px;
    }
    .title-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .title {
      font-size: 1.05rem;
      font-weight: 400;
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
      color: var(--text-color);
    }
    .layout-1 .title { -webkit-line-clamp: 1; line-clamp: 1; }
    .meta-info {
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .badge {
      background: rgba(47, 129, 247, 0.1);
      color: var(--accent);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .duration-badge {
      position: absolute;
      bottom: 6px;
      right: 6px;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 2px 5px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.5px;
      z-index: 5;
    }
    .extra-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }
    .delete {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s, transform 0.2s;
      z-index: 10;
    }
    .delete svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .card:hover .delete {
      opacity: 1;
    }
    .delete:hover {
      background: var(--danger);
      transform: scale(1.1);
    }
    .pagination {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
      margin-bottom: 32px;
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 400;
    }
    .page-btn {
      background: var(--sidebar-bg);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .page-btn:hover:not(:disabled) {
      background: var(--border-color);
      color: #fff;
    }
    .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-content {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      width: 90vw;
      max-width: 1000px;
      aspect-ratio: 16 / 9;
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      transform: scale(0.95);
      transition: transform 0.3s;
    }
    .modal-overlay.active .modal-content {
      transform: scale(1);
    }
    .modal-close {
      position: absolute;
      top: -40px;
      right: 0;
      background: none;
      border: none;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .modal-close:hover {
      opacity: 1;
    }
    .modal-body {
      flex: 1;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-body iframe, .modal-body video {
      width: 100%;
      height: 100%;
      border: none;
    }

  </style>
</head>
<body>
  <aside>
    <div class="brand">
      <svg viewBox="0 0 24 24">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
      </svg>
      <h1>Fav<span>Central</span></h1>
    </div>
    
    <div class="control-group">
      <label for="groupBy">Group By</label>
      <select id="groupBy">
          <option value="domain">Website (Domain)</option>
          <option value="type">Content Type</option>
          <option value="none">No Grouping</option>
      </select>
    </div>
    
    <div class="control-group">
      <label for="filterType">Filter Type</label>
      <select id="filterType">
          <option value="all">All Content</option>
          <option value="video">Videos</option>
          <option value="image">Images</option>
          <option value="link">Other Links</option>
      </select>
    </div>
    
    <div class="control-group">
      <label for="sortBy">Sort Order</label>
      <select id="sortBy">
          <option value="dateDesc">Newest First</option>
          <option value="dateAsc">Oldest First</option>
          <option value="nameAsc">Name (A-Z)</option>
          <option value="nameDesc">Name (Z-A)</option>
      </select>
    </div>
    
    <div class="control-group" style="margin-top: auto;">
      <label for="sizeSlider">Grid Size</label>
      <div class="slider-row">
        <span style="font-size: 14px; color: var(--text-muted);">List</span>
        <input type="range" id="sizeSlider" min="1" max="5" value="3">
        <span style="font-size: 14px; color: var(--text-muted);">Grid</span>
      </div>
    </div>
  </aside>

  <div class="sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar">
    <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
  </div>
  
  <main>
    <header>
      <h2>Your Collection</h2>
      <div class="header-actions">
        <input type="text" id="searchInput" placeholder="Find items...">
        <button id="themeToggle" class="theme-toggle" title="Toggle Theme">
          <!-- Default Moon Icon -->
          <svg viewBox="0 0 24 24" class="moon-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
      </div>
    </header>
    <div id="list"></div>
  </main>
  
  <!-- Video Embed Modal -->
  <div class="modal-overlay" id="videoModal">
    <div class="modal-content">
      <button class="modal-close" id="closeModal">&times;</button>
      <div class="modal-body" id="modalBody">
        <!-- Content injected dynamically -->
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
